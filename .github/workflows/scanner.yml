name: Market Scanner

on:
  schedule:
    # Runs every 5 minutes — GitHub may delay by up to ~1 min under load
    - cron: '*/5 * * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4   # kill if scan hangs (network issues etc.)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          # Upstash Redis — add these in GitHub → Settings → Secrets → Actions
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          # Optional — for AI summaries and Telegram alerts during scan
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner_job.py
